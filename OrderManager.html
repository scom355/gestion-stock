    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            padding: 30px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: var(--primary);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-print {
            background: var(--primary);
            color: white;
        }

        .btn-print:hover {
            background: #1d4ed8;
        }

        .order-item {
            display: grid;
            grid-template-columns: 150px 1fr 180px;
            gap: 20px;
            align-items: center;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 10px;
            background: white;
            page-break-inside: avoid;
        }

        .product-img {
            width: 140px;
            height: 140px;
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid #eee;
            background: #fdfdfd;
        }

        .details {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            font-size: 14px;
        }

        .pedido-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: stretch;
        }

        .status-badge {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            text-align: center;
            font-weight: 700;
            border: 1px solid transparent;
        }

        .status-pending {
            background: #f1f5f9;
            color: #64748b;
            border-color: #cbd5e1;
        }

        .status-yes {
            background: #dcfce7;
            color: #166534;
            border-color: #86efac;
        }

        .status-no {
            background: #fee2e2;
            color: #991b1b;
            border-color: #fecaca;
        }

        .yes-no-btns {
            display: flex;
            gap: 5px;
        }

        .btn-yes {
            background: var(--success);
            color: white;
            flex: 1;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-no {
            background: var(--danger);
            color: white;
            flex: 1;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .page-divider {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 12px;
            border-top: 1px dashed #cbd5e1;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        @media print {

            .btn,
            .yes-no-btns {
                display: none !important;
            }

            body {
                padding: 0;
                background: white;
            }

            .container {
                box-shadow: none;
                border: none;
                max-width: 100%;
                padding: 0;
            }

            .order-item {
                border: 1px solid #eee;
                margin-bottom: 5px;
                padding: 10px;
            }

            textarea {
                border: none !important;
                padding: 0 !important;
                overflow: hidden;
                height: auto !important;
            }

            .page-divider {
                page-break-after: always;
                border: none;
                height: 0;
                margin: 0;
                visibility: hidden;
            }
        }
    </style>
</head>
